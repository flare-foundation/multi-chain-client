name: Publish to NPM

on:
  push:
    tags:
      - 'v*'


      
jobs:
  test:
    runs-on: ubuntu-latest
    environment: Testing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          cache: 'true'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:all
        env:
          BTC_URL: ${{ secrets.BTC_URL }}
          BTC_USERNAME: ${{ secrets.BTC_USERNAME }}
          BTC_PASSWORD: ${{ secrets.BTC_PASSWORD }}
          BTC_URL_REGTEST: ${{ secrets.BTC_URL_REGTEST }}
          BTC_USERNAME_REGTEST: ${{ secrets.BTC_USERNAME_REGTEST }}
          BTC_PASSWORD_REGTEST: ${{ secrets.BTC_PASSWORD_REGTEST }}
          DOGE_URL: ${{ secrets.DOGE_URL }}
          DOGE_USERNAME: ${{ secrets.DOGE_USERNAME }}
          DOGE_PASSWORD: ${{ secrets.DOGE_PASSWORD }}
          DOGE_URL_REGTEST: ${{ secrets.DOGE_URL_REGTEST }}
          DOGE_USERNAME_REGTEST: ${{ secrets.DOGE_USERNAME_REGTEST }}
          DOGE_PASSWORD_REGTEST: ${{ secrets.DOGE_PASSWORD_REGTEST }}
          XRP_URL: ${{ secrets.XRP_URL }}
          XRP_USERNAME: ${{ secrets.XRP_USERNAME }}
          XRP_PASSWORD: ${{ secrets.XRP_PASSWORD }}
          XRP_URL_TESTNET: ${{ secrets.XRP_URL_TESTNET }}
          XRP_USERNAME_TESTNET: ${{ secrets.XRP_USERNAME_TESTNET }}
          XRP_PASSWORD_TESTNET: ${{ secrets.XRP_PASSWORD_TESTNET }}

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          cache: 'true'
      - uses: flare-foundation/npm-release-action@ac21bff727b4b3477924347a8c38b16797df308f
        with:
          build_script: 'build'
